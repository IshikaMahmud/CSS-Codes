<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Table</title>

    <link rel="stylesheet" href="table.css">
</head>

<body>
    <table>
        <tr>
            <th>Name</th>
            <td>IM</td>
        </tr>
        <tr>
            <th rowspan="2">Telephone</th>
            <td>1234</td>
        </tr>
        <tr>
            <td>4321</td>
        </tr>
    </table>
    <br><br>
    <table>
        <tr>
            <th>Name</th>
            <th colspan="2">Telephone</th>
        </tr>
        <tr>
            <td>IM</td>
            <td>1234
            <td>4321</td>
            </td>
        </tr>
    </table>
</body>

</html>
